# docker/docker-compose.yml


services:

  # ── Ollama — local LLM server ──────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: multimodal_rag_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama   # persist downloaded models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Model pull — runs once to pull mistral into ollama ─────────────
  ollama-pull:
    image: ollama/ollama:latest
    container_name: multimodal_rag_ollama_pull
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["/bin/sh", "-c", "ollama pull mistral"]
    restart: "no"

  # ── RAG API ────────────────────────────────────────────────────────
  api:
    build:
      context: ..          # build from repo root
      dockerfile: docker/Dockerfile
    container_name: multimodal_rag_api
    ports:
      - "8000:8000"
    volumes:
      - ../data/processed/images:/app/data/processed/images  # image files
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - HF_HUB_DISABLE_SYMLINKS_WARNING=1
    env_file:
      - ../.env            # picks up OPENAI_API_KEY if set
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ollama_data:
