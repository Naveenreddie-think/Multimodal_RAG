# Chunking
chunk_size: 300
chunk_overlap: 50

# Embeddings
embed_model: all-MiniLM-L6-v2
clip_model: openai/clip-vit-base-patch32

# Retrieval
top_k: 5
text_weight: 0.6
image_weight: 0.4
guaranteed_images: 2

# Generation
llm_model: mistralai/Mistral-7B-Instruct-v0.2
temperature: 0.2
max_new_tokens: 512

# Paths
vector_dir: data/processed/vectors
use_ollama: true
use_openai: false
llm_model: mistral
